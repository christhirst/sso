[server]
host = "0.0.0.0"
port = 3000
issuer = "http://localhost:3000"

[auth]
private_key_path = "src/private_key.pem"
public_key_path = "src/public_key.pem"
key_id = "1"
kty = "RSA"
use = "sig"
alg = "RS256"

[kerberos]
# Set to true to enable real krb5-rs validation (requires keytab)
enabled = false
keytab_path = "server.keytab"
service_principal = "HTTP/localhost"
